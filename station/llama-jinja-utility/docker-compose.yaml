# llama-jinja-utility — always-on RESIDENT utility server on :8090.
# Independent of the swappable ~/docker/llama-jinja stack (:8080), so that stack's
# `use <alias>` force-recreates never touch (cold-load) this one. Shares the 2 GPUs;
# qwen3-0.6b reserves ~1GB on GPU0, leaving the big slot ~47GB. Image pinned to the
# same b9209 digest as the main stack — bump both together on upgrade.
services:
  llama-jinja-utility:
    image: ghcr.io/ggml-org/llama.cpp@sha256:c4d2aaf10abd9130d77d117be10dee86699fd5daa4550e9385733ba173ccc334
    container_name: llama-jinja-utility
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - /models/gguf:/models:ro
    entrypoint: ["/bin/sh", "-c"]
    command: ['exec /app/llama-server --host 0.0.0.0 --port 8090 --model /models/Qwen3-0.6B-UD-Q8_K_XL.gguf --alias qwen3-0.6b -ngl -1 --ctx-size 16384 --flash-attn on --parallel 8 --jinja --slots']
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS http://localhost:8090/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
